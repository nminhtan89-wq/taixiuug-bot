<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', system-ui; background: #111827; color: white; }
        .dice { width: 110px; height: 110px; background: linear-gradient(145deg,#fff,#f1f1f1); border-radius: 18px; box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 0 8px 15px rgba(255,255,255,0.8), inset 0 -8px 15px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; position: relative; font-size: 85px; }
        .dice-number { position: absolute; font-size: 62px; font-weight: bold; color: #111827; text-shadow: 0 0 15px #fbbf24; z-index: 10; }
        @keyframes shake { 0%{transform:translate(0,0)rotate(0deg)} 10%{transform:translate(-6px,5px)rotate(-8deg)} 20%{transform:translate(5px,-4px)rotate(7deg)} 30%{transform:translate(-4px,3px)rotate(-6deg)} 40%{transform:translate(6px,-5px)rotate(8deg)} 50%{transform:translate(-3px,4px)rotate(-4deg)} 100%{transform:translate(0,0)rotate(0deg)} }
        .shake { animation: shake 0.9s; }
        .tab-active { border-bottom: 4px solid #fbbf24; }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-md mx-auto bg-zinc-900 min-h-screen flex flex-col">
        <div class="bg-black p-4 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div id="avatar" class="w-10 h-10 bg-yellow-400 rounded-full flex items-center justify-center text-3xl">👤</div>
                <div>
                    <div id="username" class="font-bold">Guest</div>
                    <div id="tg-id-display" class="text-emerald-400 text-xs">ID: loading...</div>
                </div>
            </div>
            <div class="text-right">
                <div class="text-yellow-400 text-2xl font-bold" id="balance">500.00</div>
                <div class="text-xs text-zinc-400">CREDITS (1000=1 USDT)</div>
            </div>
        </div>

        <div class="flex border-b border-zinc-700 text-sm">
            <button onclick="switchTab(0)" class="tab-active flex-1 py-3" id="tab0">CHƠI</button>
            <button onclick="switchTab(1)" class="flex-1 py-3" id="tab1">NẠP USDT</button>
            <button onclick="switchTab(2)" class="flex-1 py-3" id="tab2">RÚT</button>
            <button onclick="switchTab(3)" class="flex-1 py-3" id="tab3">LỊCH SỬ</button>
        </div>

        <div id="content0" class="flex-1 p-6">
            <div class="text-center mb-2 text-yellow-300 text-xs">VÒNG MỚI SAU</div>
            <div id="countdown" class="text-center text-7xl font-bold text-yellow-400 mb-6">20</div>
            <div class="flex justify-center gap-6 mb-8">
                <div id="dice1" class="dice">🎲<span class="dice-number">?</span></div>
                <div id="dice2" class="dice">🎲<span class="dice-number">?</span></div>
                <div id="dice3" class="dice">🎲<span class="dice-number">?</span></div>
            </div>
            <div class="text-center mb-6">
                <div id="result-sum" class="text-4xl font-bold text-yellow-400">?</div>
                <div id="result-text" class="text-2xl font-bold mt-2"></div>
            </div>
            <div class="bg-zinc-800 rounded-2xl p-6">
                <div class="text-center text-xs mb-4">ĐÃ CƯỢC: <span id="current-bet-display" class="text-yellow-400 font-bold">0 Credits</span> (<span id="current-choice-display" class="text-yellow-400">chưa chọn</span>)</div>
                <div class="flex gap-4 mb-6">
                    <button onclick="selectChoice('Tai')" id="btn-tai" class="flex-1 py-5 rounded-2xl bg-green-600 font-bold text-xl">TÀI</button>
                    <button onclick="selectChoice('Xiu')" id="btn-xiu" class="flex-1 py-5 rounded-2xl bg-red-600 font-bold text-xl">XỈU</button>
                </div>
                <div class="flex gap-3">
                    <input id="bet-amount" type="number" value="0" class="flex-1 bg-zinc-900 text-center text-3xl py-5 rounded-2xl" oninput="updateBetDisplay()">
                    <button onclick="setMaxBet()" class="bg-yellow-400 text-black px-8 rounded-2xl font-bold">MAX</button>
                </div>
            </div>
        </div>

        <div id="content1" class="flex-1 p-6 hidden">
            <div class="bg-zinc-800 rounded-3xl p-8 text-center">
                <div class="text-2xl font-bold text-yellow-400 mb-6">NẠP USDT (BEP-20)</div>
                <div class="bg-black p-5 rounded-2xl mb-6">
                    <div class="font-mono text-emerald-400 text-sm break-all">0x7f8dedb8c6d352391475fbb7c43e49fd1efb58de</div>
                </div>
                <button onclick="copyAddress()" class="bg-emerald-500 w-full py-5 rounded-2xl font-bold text-xl">📋 COPY ĐỊA CHỈ</button>
            </div>
        </div>

        <div class="bg-black p-4 text-center text-xs text-zinc-500">Auto roll 20s • Dữ liệu gửi về máy tính bạn</div>
    </div>

    <script>
        let telegramId = 'local-test';
        let balance = 500;
        let choice = '';
        let betAmount = 0;
        let countdown = 20;
        let countdownInterval = null;

        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
            const user = Telegram.WebApp.initDataUnsafe.user;
            if (user && user.id) {
                telegramId = user.id.toString();
                document.getElementById('username').textContent = user.first_name || 'Player';
            }
        }
        document.getElementById('tg-id-display').textContent = `ID: ${telegramId}`;

        function updateBetDisplay() {
            let input = document.getElementById('bet-amount');
            betAmount = parseFloat(input.value) || 0;
            if (betAmount > balance) {
                betAmount = balance;
                input.value = balance;
                alert('❌ Không đủ Credits!');
            }
            document.getElementById('current-bet-display').textContent = betAmount + ' Credits';
            document.getElementById('current-choice-display').textContent = choice || 'chưa chọn';
        }

        function setMaxBet() {
            document.getElementById('bet-amount').value = balance;
            updateBetDisplay();
        }

        function rollDiceAuto() {
            const diceEls = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];
            diceEls.forEach(d => d.classList.add('shake'));
            setTimeout(() => {
                let total = 0;
                for (let i = 0; i < 3; i++) {
                    const num = Math.floor(Math.random() * 6) + 1;
                    diceEls[i].innerHTML = `🎲<span class="dice-number">${num}</span>`;
                    total += num;
                }
                diceEls.forEach(d => d.classList.remove('shake'));

                document.getElementById('result-sum').textContent = total;
                const win = (choice === 'Tai' && total > 10) || (choice === 'Xiu' && total <= 10);
                document.getElementById('result-text').innerHTML = win ? '🎉 THẮNG!' : '😢 THUA';

                if (betAmount >= 10 && choice) {
                    balance += win ? betAmount : -betAmount;
                    if (balance < 0) balance = 0;
                    document.getElementById('balance').textContent = balance.toFixed(2);

                    // GỬI DỮ LIỆU VỀ MÁY TÍNH CỦA ANH
                    Telegram.WebApp.sendData(JSON.stringify({
                        action: 'update_balance',
                        telegramId: telegramId,
                        balance: balance
                    }));
                }

                choice = '';
                betAmount = 0;
                document.getElementById('bet-amount').value = '0';
                updateBetDisplay();
            }, 900);
        }

        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            countdown = 20;
            document.getElementById('countdown').textContent = 20;
            countdownInterval = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    rollDiceAuto();
                    setTimeout(startCountdown, 1200);
                }
            }, 1000);
        }

        function selectChoice(c) {
            choice = c;
            document.getElementById('btn-tai').classList.toggle('bg-green-500', c === 'Tai');
            document.getElementById('btn-xiu').classList.toggle('bg-red-500', c === 'Xiu');
            updateBetDisplay();
        }

        function copyAddress() {
            navigator.clipboard.writeText("0x7f8dedb8c6d352391475fbb7c43e49fd1efb58de");
            alert('✅ Đã copy địa chỉ ví!');
        }

        function switchTab(n) {
            document.querySelectorAll('#tab0,#tab1,#tab2,#tab3').forEach((b,i) => b.classList.toggle('tab-active', i===n));
            document.querySelectorAll('#content0,#content1').forEach((c,i) => c.classList.toggle('hidden', i!==n));
        }

        switchTab(0);
        startCountdown();
    </script>
</body>
</html>
