<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DICE MASTER - TÀI XỈU</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        /* Reset chuẩn để chống vỡ layout trên Mobile */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Press Start 2P', cursive; background: #0a0a0a; color: white; overflow-x: hidden; font-size: 10px; }

        .app-container { max-width: 450px; margin: 0 auto; background: #050505; min-height: 100vh; display: flex; flex-direction: column; border-left: 1px solid #222; border-right: 1px solid #222; }

        /* HEADER */
        .header { background: black; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffeb3b; position: sticky; top: 0; z-index: 100; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; background: #ffeb3b; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; color: black; }
        .username { font-size: 8px; font-weight: bold; max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
        .tg-id { font-size: 7px; color: #4ae3b5; margin-top: 4px; }
        .balance-group { text-align: right; }
        .balance-amount { font-size: 18px; color: #fff176; font-weight: bold; }
        .balance-label { font-size: 6px; color: #666; margin-top: 2px; }

        /* TABS */
        .tabs { display: flex; background: #000; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; padding: 15px 0; background: none; border: none; color: #555; font-family: 'Press Start 2P', cursive; font-size: 8px; cursor: pointer; }
        .tab-btn.active { color: #ffeb3b; border-bottom: 3px solid #ffeb3b; }

        /* GAME AREA */
        .game-content { padding: 20px; flex: 1; display: flex; flex-direction: column; align-items: center; }
        .countdown-label { font-size: 8px; color: #ffeb3b; margin-top: 10px; }
        .countdown-num { font-size: 60px; color: #ffeb3b; margin: 15px 0; }
        
        .dice-area { display: flex; gap: 12px; margin-bottom: 20px; height: 85px; align-items: center; }
        .dice { width: 75px; height: 75px; background: linear-gradient(145deg, #ffeb3b, #f57f17); border-radius: 12px; box-shadow: 0 0 15px rgba(255, 235, 59, 0.4); display: flex; justify-content: center; align-items: center; position: relative; }
        .dice-number { position: absolute; font-size: 36px; color: #111; font-weight: 900; }
        
        @keyframes shake { 0%{transform:rotate(0deg)} 25%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} 75%{transform:rotate(-5deg)} 100%{transform:rotate(0deg)} }
        .shake { animation: shake 0.15s infinite; }

        .result-sum { font-size: 30px; color: #fff176; margin-bottom: 10px; }
        .status-text { font-size: 9px; text-transform: uppercase; margin-bottom: 20px; height: 12px; }

        /* BUTTONS TÀI XỈU */
        .choice-group { display: flex; gap: 10px; width: 100%; margin-bottom: 20px; }
        .btn-choice { flex: 1; padding: 18px 0; border-radius: 12px; border: none; font-family: 'Press Start 2P', cursive; border-bottom: 4px solid rgba(0,0,0,0.3); }
        .btn-choice.active { outline: 3px solid white; outline-offset: 2px; transform: scale(1.02); }
        .btn-xiu { background: #3b82f6; color: white; }
        .btn-tai { background: #ef4444; color: white; }
        .btn-label { font-size: 14px; display: block; margin-bottom: 4px; }
        .btn-sub { font-size: 7px; opacity: 0.7; }

        /* PHẦN NHẬP CƯỢC - FIX LỖI KHUNG ĐỎ */
        .bet-box { background: #111; border-radius: 15px; padding: 15px; width: 100%; border: 1px solid #222; }
        .bet-info { display: flex; justify-content: space-between; font-size: 7px; color: #666; margin-bottom: 10px; }
        
        .bet-input-container { 
            display: flex; 
            background: #000; 
            border: 2px solid #ffeb3b; 
            border-radius: 10px; 
            height: 55px; 
            overflow: hidden; 
            width: 100%;
            align-items: stretch;
        }
        
        .bet-input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: #ffeb3b; 
            font-family: 'Press Start 2P', cursive; 
            font-size: 16px; 
            padding: 0 15px; 
            outline: none; 
            text-align: right;
            width: 100%; /* Ép chiếm hết khoảng trống */
            min-width: 0; /* Fix lỗi input không co lại trên một số máy Android */
        }

        .btn-max { 
            background: #ffeb3b; 
            color: #000; 
            border: none; 
            font-family: 'Press Start 2P', cursive; 
            font-size: 10px; 
            font-weight: bold; 
            padding: 0 20px; 
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* Ẩn nút tăng giảm mặc định */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .tab-content.hidden { display: none; }
        .footer { padding: 15px; text-align: center; font-size: 6px; color: #333; margin-top: auto; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="user-info">
                <div id="avatar" class="avatar">👤</div>
                <div>
                    <div id="username" class="username">GUEST</div>
                    <div id="tg-id-display" class="tg-id">ID: 000000</div>
                </div>
            </div>
            <div class="balance-group">
                <div id="balance" class="balance-amount">500.00</div>
                <div class="balance-label">CREDITS</div>
            </div>
        </div>

        <div class="tabs">
            <button onclick="switchTab(0)" class="tab-btn active" id="tab0">🎲 CHƠI</button>
            <button onclick="switchTab(1)" class="tab-btn" id="tab1">💰 NẠP</button>
            <button onclick="switchTab(2)" class="tab-btn" id="tab2">💸 RÚT</button>
        </div>

        <div id="content0" class="tab-content game-content">
            <div class="countdown-label">PHIÊN MỚI TRONG</div>
            <div id="countdown" class="countdown-num">20</div>
            
            <div class="dice-area">
                <div id="dice1" class="dice">🎲<span class="dice-number">?</span></div>
                <div id="dice2" class="dice">🎲<span class="dice-number">?</span></div>
                <div id="dice3" class="dice">🎲<span class="dice-number">?</span></div>
            </div>

            <div id="result-sum" class="result-sum">?</div>
            <div id="status-text" class="status-text">MỜI ĐẶT CỬA</div>

            <div class="choice-group">
                <button id="btn-xiu" onclick="selectChoice('Xiu')" class="btn-choice btn-xiu">
                    <span class="btn-label">XỈU</span>
                    <span class="btn-sub">4-10</span>
                </button>
                <button id="btn-tai" onclick="selectChoice('Tai')" class="btn-choice btn-tai">
                    <span class="btn-label">TÀI</span>
                    <span class="btn-sub">11-17</span>
                </button>
            </div>

            <div class="bet-box">
                <div class="bet-info">
                    <span>TIỀN CƯỢC</span>
                    <span>ĐÃ CƯỢC: <span id="current-bet-display" style="color:#ffeb3b">0.00</span></span>
                </div>
                <div class="bet-input-container">
                    <input id="bet-amount" type="number" value="10" class="bet-input" oninput="updateBetDisplay()">
                    <button onclick="setMaxBet()" class="btn-max">MAX</button>
                </div>
            </div>
        </div>

        <div id="content1" class="tab-content hidden" style="padding: 40px; text-align: center; font-size: 8px;">
            <p style="color:#ffeb3b">NẠP USDT BEP-20</p>
            <div style="background:#000; padding:10px; margin:20px 0; border:1px solid #222; word-break:break-all;">0x71C4B136155554157121215444541571212154</div>
            <p>Vui lòng chuyển khoản và đợi hệ thống duyệt.</p>
        </div>
        <div id="content2" class="tab-content hidden" style="padding: 40px; text-align: center; font-size: 8px;">
            <p style="color:#ef4444">RÚT TIỀN</p>
            <p style="margin-top:20px">Tính năng đang bảo trì.</p>
        </div>

        <div class="footer">FAIR PLAY & ANTI-CHEAT SYSTEM</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let telegramId = 'local-user';
        let balance = 500;
        let choice = '';
        let betAmount = 10;
        let countdown = 20;
        let countdownInterval = null;

        function initApp() {
            tg.ready();
            tg.expand();
            
            if (tg.initDataUnsafe.user) {
                const user = tg.initDataUnsafe.user;
                telegramId = user.id.toString();
                document.getElementById('username').textContent = (user.username || user.first_name).toUpperCase();
                document.getElementById('tg-id-display').textContent = `ID: ${telegramId}`;
            }
            
            const saved = localStorage.getItem(`bal_${telegramId}`);
            if (saved) balance = parseFloat(saved);
            updateBalance();
            startCountdown();
        }

        function updateBalance() {
            document.getElementById('balance').textContent = balance.toFixed(2);
            localStorage.setItem(`bal_${telegramId}`, balance);
        }

        function updateBetDisplay() {
            let val = parseFloat(document.getElementById('bet-amount').value) || 0;
            if (val > balance) val = balance;
            betAmount = val;
            document.getElementById('current-bet-display').textContent = betAmount.toFixed(2);
        }

        function setMaxBet() {
            document.getElementById('bet-amount').value = balance;
            updateBetDisplay();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function selectChoice(c) {
            choice = c;
            document.getElementById('btn-tai').classList.toggle('active', c === 'Tai');
            document.getElementById('btn-xiu').classList.toggle('active', c === 'Xiu');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function rollDice() {
            const diceEls = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];
            diceEls.forEach(d => d.classList.add('shake'));
            document.getElementById('status-text').textContent = "ĐANG LẮC...";

            setTimeout(() => {
                let total = 0;
                let results = [];
                for (let i = 0; i < 3; i++) {
                    const n = Math.floor(Math.random() * 6) + 1;
                    results.push(n);
                    total += n;
                }

                diceEls.forEach((d, i) => {
                    d.classList.remove('shake');
                    d.innerHTML = `🎲<span class="dice-number">${results[i]}</span>`;
                });

                document.getElementById('result-sum').textContent = total;
                const outcome = (total >= 11) ? 'Tai' : 'Xiu';
                
                if (choice !== '') {
                    if (choice === outcome) {
                        balance += betAmount;
                        document.getElementById('status-text').innerHTML = `<span style="color:#4ae3b5">THẮNG +${betAmount.toFixed(2)}</span>`;
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    } else {
                        balance -= betAmount;
                        document.getElementById('status-text').innerHTML = `<span style="color:#ef4444">THUA -${betAmount.toFixed(2)}</span>`;
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                    }
                    updateBalance();
                } else {
                    document.getElementById('status-text').textContent = "KẾT QUẢ: " + outcome.toUpperCase();
                }

                choice = '';
                document.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('active'));
                setTimeout(startCountdown, 3000);
            }, 1500);
        }

        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            countdown = 20;
            document.getElementById('countdown').textContent = countdown;
            document.getElementById('status-text').textContent = "MỜI ĐẶT CỬA";
            document.getElementById('result-sum').textContent = "?";
            
            countdownInterval = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    rollDice();
                }
            }, 1000);
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('hidden', i !== n));
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === n));
        }

        initApp();
    </script>
</body>
</html>
