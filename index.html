<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DICE MASTER PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; line-height: 1.5; }

        .app-container { max-width: 450px; margin: 0 auto; background: #050505; min-height: 100vh; display: flex; flex-direction: column; border-x: 1px solid #222; }

        /* HEADER */
        .header { background: #000; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffeb3b; position: sticky; top: 0; z-index: 100; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 42px; height: 42px; background: #ffeb3b; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 22px; color: black; flex-shrink: 0; font-weight: bold; }
        .username { font-size: 14px; font-weight: 700; color: #fff; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tg-id { font-size: 11px; color: #4ae3b5; font-weight: 500; }
        .balance-group { text-align: right; }
        .balance-amount { font-size: 22px; color: #fff176; font-weight: 900; letter-spacing: -0.5px; }
        .balance-label { font-size: 10px; color: #666; text-transform: uppercase; font-weight: 700; }

        /* TABS */
        .tabs { display: flex; background: #000; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; padding: 15px 0; background: none; border: none; color: #555; font-size: 13px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { color: #ffeb3b; border-bottom: 3px solid #ffeb3b; }

        /* GAME AREA */
        .game-content { padding: 20px; flex: 1; display: flex; flex-direction: column; align-items: center; }
        .label-style { font-size: 11px; color: #ffeb3b; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
        .countdown-num { font-size: 80px; color: #ffeb3b; font-weight: 900; margin: 10px 0; line-height: 1; }
        
        .dice-area { display: flex; gap: 15px; margin: 20px 0; height: 90px; align-items: center; }
        .dice { width: 85px; height: 85px; background: linear-gradient(145deg, #ffeb3b, #f57f17); border-radius: 18px; box-shadow: 0 0 25px rgba(255, 235, 59, 0.4); display: flex; justify-content: center; align-items: center; position: relative; }
        .dice-number { position: absolute; font-size: 45px; color: #111; font-weight: 900; }
        
        @keyframes shake { 0%{transform:rotate(0deg)} 25%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} 75%{transform:rotate(-5deg)} 100%{transform:rotate(0deg)} }
        .shake { animation: shake 0.1s infinite; }

        .result-sum { font-size: 40px; color: #fff176; font-weight: 900; margin-bottom: 10px; }
        .status-text { font-size: 14px; font-weight: 700; text-transform: uppercase; min-height: 20px; margin-bottom: 25px; text-align: center; }

        /* CHOICE BUTTONS */
        .choice-group { display: flex; gap: 12px; width: 100%; margin-bottom: 20px; }
        .btn-choice { flex: 1; padding: 20px 0; border-radius: 16px; border: none; cursor: pointer; transition: 0.2s; border-bottom: 5px solid rgba(0,0,0,0.3); }
        .btn-choice.active { outline: 3px solid white; outline-offset: 2px; transform: scale(1.02); }
        .btn-xiu { background: #2563eb; color: white; }
        .btn-tai { background: #dc2626; color: white; }
        .btn-label { font-size: 20px; font-weight: 900; display: block; margin-bottom: 2px; }
        .btn-sub { font-size: 11px; font-weight: 600; opacity: 0.8; }

        /* BET BOX */
        .bet-box { background: #111; border-radius: 20px; padding: 18px; width: 100%; border: 1px solid #222; }
        .bet-info { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 12px; font-weight: 700; }
        
        .bet-input-container { display: flex; background: #000; border: 2px solid #ffeb3b; border-radius: 14px; height: 60px; overflow: hidden; width: 100%; align-items: stretch; }
        .bet-input { flex: 1; background: transparent; border: none; color: #ffeb3b; font-size: 24px; font-weight: 900; padding: 0 15px; outline: none; text-align: right; width: 100%; font-family: 'Inter', sans-serif; }
        .btn-max { background: #ffeb3b; color: #000; border: none; font-size: 14px; font-weight: 900; padding: 0 25px; cursor: pointer; display: flex; align-items: center; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .tab-content.hidden { display: none; }
        .footer { padding: 20px; text-align: center; font-size: 10px; color: #444; font-weight: 700; margin-top: auto; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="user-info">
                <div id="avatar" class="avatar">👤</div>
                <div>
                    <div id="username" class="username">GUEST USER</div>
                    <div id="tg-id-display" class="tg-id">ID: 000000000</div>
                </div>
            </div>
            <div class="balance-group">
                <div id="balance" class="balance-amount">500.00</div>
                <div class="balance-label">Credits</div>
            </div>
        </div>

        <div class="tabs">
            <button onclick="switchTab(0)" class="tab-btn active" id="tab0">Chơi</button>
            <button onclick="switchTab(1)" class="tab-btn" id="tab1">Nạp</button>
            <button onclick="switchTab(2)" class="tab-btn" id="tab2">Rút</button>
        </div>

        <div id="content0" class="tab-content game-content">
            <div class="label-style">PHIÊN MỚI TRONG</div>
            <div id="countdown" class="countdown-num">20</div>
            
            <div class="dice-area">
                <div id="dice1" class="dice">🎲<span class="dice-number">?</span></div>
                <div id="dice2" class="dice">🎲<span class="dice-number">?</span></div>
                <div id="dice3" class="dice">🎲<span class="dice-number">?</span></div>
            </div>

            <div id="result-sum" class="result-sum">?</div>
            <div id="status-text" class="status-text">Mời đặt cửa</div>

            <div class="choice-group">
                <button id="btn-xiu" onclick="selectChoice('Xiu')" class="btn-choice btn-xiu">
                    <span class="btn-label">XỈU</span>
                    <span class="btn-sub">4-10</span>
                </button>
                <button id="btn-tai" onclick="selectChoice('Tai')" class="btn-choice btn-tai">
                    <span class="btn-label">TÀI</span>
                    <span class="btn-sub">11-17</span>
                </button>
            </div>

            <div class="bet-box">
                <div class="bet-info">
                    <span>MỨC CƯỢC</span>
                    <span>ĐÃ CHỌN: <span id="current-bet-display" style="color:#ffeb3b">10.00</span></span>
                </div>
                <div class="bet-input-container">
                    <input id="bet-amount" type="number" value="10" class="bet-input" oninput="validateBet()" onblur="validateBet()">
                    <button onclick="setMaxBet()" class="btn-max">MAX</button>
                </div>
            </div>
        </div>

        <div id="content1" class="tab-content hidden" style="padding: 40px; text-align: center;">
            <p style="color:#ffeb3b; font-weight: 700;">NẠP USDT (BEP-20)</p>
            <div style="background:#000; padding:15px; margin:20px 0; border:1px solid #222; word-break:break-all; font-size: 12px; border-radius: 10px;">0x71C4B136155554157121215444541571212154</div>
            <p style="font-size: 11px; color: #888;">Sau khi chuyển khoản, vui lòng chờ 1-3 phút để hệ thống xác nhận.</p>
        </div>
        <div id="content2" class="tab-content hidden" style="padding: 40px; text-align: center;">
            <p style="color:#ef4444; font-weight: 700;">RÚT TIỀN</p>
            <p style="margin-top:20px; color: #888;">Hệ thống bảo trì.</p>
        </div>

        <div class="footer">DICE MASTER • SECURE & FAIR PLAY</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let telegramId = 'local-test';
        let balance = 500;
        let choice = '';
        let betAmount = 10;
        let countdown = 20;
        let countdownInterval = null;

        function initApp() {
            tg.ready();
            tg.expand();
            if (tg.initDataUnsafe.user) {
                const user = tg.initDataUnsafe.user;
                telegramId = user.id.toString();
                document.getElementById('username').textContent = (user.username || user.first_name).toUpperCase();
                document.getElementById('tg-id-display').textContent = `ID: ${telegramId}`;
            }
            const saved = localStorage.getItem(`bal_v4_${telegramId}`);
            if (saved) balance = parseFloat(saved);
            updateBalance();
            startCountdown();
        }

        function validateBet() {
            let input = document.getElementById('bet-amount');
            let val = parseFloat(input.value);
            if (isNaN(val) || val < 0) val = 0;
            if (val > balance) {
                val = balance;
                input.value = val;
            }
            betAmount = val;
            document.getElementById('current-bet-display').textContent = betAmount.toFixed(2);
        }

        function updateBalance() {
            document.getElementById('balance').textContent = balance.toFixed(2);
            localStorage.setItem(`bal_v4_${telegramId}`, balance);
        }

        function setMaxBet() {
            document.getElementById('bet-amount').value = balance;
            validateBet();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function selectChoice(c) {
            choice = c;
            document.getElementById('btn-tai').classList.toggle('active', c === 'Tai');
            document.getElementById('btn-xiu').classList.toggle('active', c === 'Xiu');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        // --- HÀM LẮC XÚC XẮC ĐÃ CHẶN LỖI HẾT ĐIỂM ---
        function rollDice() {
            // Kiểm tra: Nếu người chơi có chọn cửa nhưng tiền cược bằng 0 hoặc lớn hơn số dư
            if (choice !== '' && (betAmount <= 0 || betAmount > balance)) {
                document.getElementById('status-text').innerHTML = `<span style="color:#ef4444">HẾT TIỀN! VUI LÒNG NẠP THÊM</span>`;
                choice = ''; // Hủy lựa chọn để không bị trừ tiền vớ vẩn
                document.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('active'));
                setTimeout(startCountdown, 3000);
                return; // Dừng lại không lắc
            }

            const diceEls = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];
            diceEls.forEach(d => d.classList.add('shake'));
            document.getElementById('status-text').textContent = "Đang lắc...";

            setTimeout(() => {
                let total = 0;
                let results = [];
                for (let i = 0; i < 3; i++) {
                    const n = Math.floor(Math.random() * 6) + 1;
                    results.push(n);
                    total += n;
                }

                diceEls.forEach((d, i) => {
                    d.classList.remove('shake');
                    d.innerHTML = `🎲<span class="dice-number">${results[i]}</span>`;
                });

                document.getElementById('result-sum').textContent = total;
                const outcome = (total >= 11) ? 'Tai' : 'Xiu';
                
                if (choice !== '') {
                    if (choice === outcome) {
                        balance += betAmount;
                        document.getElementById('status-text').innerHTML = `<span style="color:#4ae3b5">THẮNG +${betAmount.toFixed(2)}</span>`;
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    } else {
                        balance -= betAmount;
                        document.getElementById('status-text').innerHTML = `<span style="color:#ef4444">THUA -${betAmount.toFixed(2)}</span>`;
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                    }
                    updateBalance();
                } else {
                    document.getElementById('status-text').textContent = "KẾT QUẢ: " + outcome.toUpperCase();
                }

                choice = '';
                document.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('active'));
                setTimeout(startCountdown, 3000);
            }, 1500);
        }

        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            countdown = 20;
            document.getElementById('countdown').textContent = countdown;
            document.getElementById('status-text').textContent = "Mời đặt cửa";
            document.getElementById('result-sum').textContent = "?";
            
            countdownInterval = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    rollDice();
                }
            }, 1000);
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('hidden', i !== n));
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === n));
        }

        initApp();
    </script>
</body>
</html>
