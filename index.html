<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DICE MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', system-ui; background: #0a0a0a; color: white; overflow-x: hidden; }
        .dice { width: 80px; height: 80px; background: linear-gradient(145deg,#ffeb3b,#f57f17); border-radius: 15px; box-shadow: 0 0 20px rgba(255, 235, 59, 0.5); display: flex; align-items: center; justify-content: center; position: relative; }
        .dice-number { position: absolute; font-size: 40px; color: #111827; font-weight: 900; }
        @keyframes shake { 0%{transform:rotate(0deg)} 25%{transform:rotate(-18deg)} 50%{transform:rotate(18deg)} 75%{transform:rotate(-12deg)} 100%{transform:rotate(0deg)} }
        .shake { animation: shake 0.5s infinite; }
        .tab-active { border-bottom: 4px solid #ffeb3b; color: #ffeb3b; }
        .btn-choice.active { border: 4px solid white; transform: scale(1.05); }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-md mx-auto bg-zinc-950 min-h-screen flex flex-col">
        <div class="bg-black p-4 flex justify-between items-center sticky top-0 z-50 border-b border-yellow-400">
            <div class="flex items-center gap-2">
                <div id="avatar" class="w-10 h-10 bg-yellow-400 rounded-full flex items-center justify-center text-2xl">👤</div>
                <div>
                    <div id="username" class="font-bold text-xs">GUEST</div>
                    <div id="tg-id-display" class="text-emerald-400" style="font-size: 8px;">ID: LOADING...</div>
                </div>
            </div>
            <div class="text-right">
                <div id="balance" class="text-xl font-bold text-yellow-300">500.00</div>
                <div class="text-[8px] text-zinc-500">CREDITS</div>
            </div>
        </div>

        <div class="flex bg-black border-b border-zinc-700 text-[10px] sticky top-[73px] z-50">
            <button onclick="switchTab(0)" class="tab-active flex-1 py-4" id="tab0">🎲 CHƠI</button>
            <button onclick="switchTab(1)" class="flex-1 py-4" id="tab1">💬 CHAT</button>
            <button onclick="switchTab(2)" class="flex-1 py-4" id="tab2">💰 NẠP</button>
            <button onclick="switchTab(3)" class="flex-1 py-4" id="tab3">💸 RÚT</button>
        </div>

        <div id="content0" class="tab-content flex-1 p-4">
            <div class="text-center mb-1 text-yellow-300 text-[8px]">PHIÊN MỚI SAU</div>
            <div id="countdown" class="text-center text-6xl font-bold text-yellow-400 mb-6">20</div>
            
            <div class="flex justify-center gap-4 mb-8">
                <div id="dice1" class="dice">🎲<span class="dice-number">?</span></div>
                <div id="dice2" class="dice">🎲<span class="dice-number">?</span></div>
                <div id="dice3" class="dice">🎲<span class="dice-number">?</span></div>
            </div>

            <div class="text-center mb-6 h-16">
                <div id="result-sum" class="text-4xl font-bold text-yellow-300">?</div>
                <div id="result-text" class="text-sm font-bold mt-2 h-4"></div>
            </div>

            <div class="flex gap-2 mb-6">
                <button id="btn-xiu" onclick="selectChoice('Xiu')" class="btn-choice flex-1 bg-blue-600 py-4 rounded-xl font-bold text-sm border-b-4 border-blue-800">XỈU<br><span class="text-[8px]">(4-10)</span></button>
                <button id="btn-tai" onclick="selectChoice('Tai')" class="btn-choice flex-1 bg-red-600 py-4 rounded-xl font-bold text-sm border-b-4 border-red-800">TÀI<br><span class="text-[8px]">(11-17)</span></button>
            </div>

            <div class="bg-zinc-900 rounded-2xl p-4">
                <div class="text-center text-[10px] mb-3">TIỀN CƯỢC: <span id="current-bet-display" class="text-yellow-400">0</span></div>
                <div class="flex items-center gap-1">
                    <input id="bet-amount" type="number" value="0" class="flex-1 bg-black text-center text-2xl py-4 rounded-l-xl border border-yellow-400 focus:outline-none" oninput="updateBetDisplay()">
                    <button onclick="setMaxBet()" class="bg-yellow-400 text-black px-6 py-4 rounded-r-xl font-bold text-sm">MAX</button>
                </div>
            </div>
        </div>

        <div id="content1" class="tab-content hidden p-6 text-center text-xs">CHAT ĐANG PHÁT TRIỂN...</div>
        <div id="content2" class="tab-content hidden p-6 text-center text-xs">NẠP USDT QUA BEP20...</div>
        <div id="content3" class="tab-content hidden p-6 text-center text-xs">RÚT TIỀN VỀ VÍ...</div>

        <div class="bg-black p-4 text-center text-[8px] text-zinc-500 uppercase tracking-widest">Auto roll 20s • Fair Play</div>
    </div>

    <script>
        let telegramId = 'local-test';
        let balance = 500;
        let choice = '';
        let betAmount = 0;
        let countdown = 20;
        let countdownInterval = null;

        // Init Telegram
        if (window.Telegram && Telegram.WebApp) {
            const tg = Telegram.WebApp;
            tg.ready();
            tg.expand();
            const user = tg.initDataUnsafe.user;
            if (user) {
                telegramId = user.id.toString();
                document.getElementById('username').textContent = (user.username || user.first_name).toUpperCase();
            }
        }
        document.getElementById('tg-id-display').textContent = `ID: ${telegramId}`;

        // Load Balance
        const saved = localStorage.getItem(`balance_${telegramId}`);
        if (saved) balance = parseFloat(saved);
        updateBalanceDisplay();

        function updateBalanceDisplay() {
            document.getElementById('balance').textContent = balance.toFixed(2);
            localStorage.setItem(`balance_${telegramId}`, balance);
        }

        function updateBetDisplay() {
            let input = document.getElementById('bet-amount');
            let val = parseFloat(input.value) || 0;
            if (val > balance) val = balance;
            if (val < 0) val = 0;
            betAmount = val;
            document.getElementById('current-bet-display').textContent = betAmount;
        }

        function setMaxBet() {
            document.getElementById('bet-amount').value = balance;
            updateBetDisplay();
        }

        function selectChoice(c) {
            choice = c;
            document.getElementById('btn-tai').classList.toggle('active', c === 'Tai');
            document.getElementById('btn-xiu').classList.toggle('active', c === 'Xiu');
        }

        function rollDiceAuto() {
            const diceEls = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];
            diceEls.forEach(d => d.classList.add('shake'));
            document.getElementById('result-text').textContent = "ĐANG LẮC...";

            setTimeout(() => {
                let total = 0;
                let results = [];
                for (let i = 0; i < 3; i++) {
                    const num = Math.floor(Math.random() * 6) + 1;
                    results.push(num);
                    total += num;
                }

                // Cập nhật giao diện xúc xắc
                diceEls.forEach((d, i) => {
                    d.classList.remove('shake');
                    d.innerHTML = `🎲<span class="dice-number">${results[i]}</span>`;
                });

                document.getElementById('result-sum').textContent = total;
                let outcome = (total >= 11) ? 'Tai' : 'Xiu';
                
                // Xử lý thắng thua
                if (choice !== '') {
                    if (choice === outcome) {
                        let winMoney = betAmount; 
                        balance += winMoney;
                        document.getElementById('result-text').innerHTML = `<span class="text-green-500">🎉 THẮNG +${winMoney}</span>`;
                    } else {
                        balance -= betAmount;
                        document.getElementById('result-text').innerHTML = `<span class="text-red-500">😢 THUA -${betAmount}</span>`;
                    }
                    updateBalanceDisplay();
                } else {
                    document.getElementById('result-text').textContent = `KẾT QUẢ: ${outcome.toUpperCase()}`;
                }

                // Reset ván mới
                choice = '';
                betAmount = 0;
                document.getElementById('bet-amount').value = 0;
                document.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('active'));
                updateBetDisplay();
                
                setTimeout(startCountdown, 3000); // Đợi 3s rồi đếm ngược tiếp
            }, 1500);
        }

        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            countdown = 20;
            document.getElementById('countdown').textContent = countdown;
            document.getElementById('result-text').textContent = "";
            document.getElementById('result-sum').textContent = "?";

            countdownInterval = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    rollDiceAuto();
                }
            }, 1000);
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach((content, i) => {
                content.classList.toggle('hidden', i !== n);
            });
            document.querySelectorAll('button[id^="tab"]').forEach((btn, i) => {
                btn.classList.toggle('tab-active', i === n);
            });
        }

        // Start
        startCountdown();
    </script>
</body>
</html>
