<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', system-ui; background: #0a0a0a; color: white; }
        .dice { width: 120px; height: 120px; background: linear-gradient(145deg,#ffeb3b,#f9a825); border-radius: 20px; box-shadow: 0 0 40px #ffeb3b; display: flex; align-items: center; justify-content: center; position: relative; font-size: 90px; }
        .dice-number { position: absolute; font-size: 68px; color: #111827; font-weight: 900; }
        @keyframes shake { 0%{transform:rotate(0deg)} 25%{transform:rotate(-15deg)} 50%{transform:rotate(15deg)} 75%{transform:rotate(-10deg)} 100%{transform:rotate(0deg)} }
        .shake { animation: shake 0.9s; }
        .tab-active { border-bottom: 5px solid #ffeb3b !important; color: #ffeb3b; }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-md mx-auto bg-zinc-950 min-h-screen flex flex-col">
        <!-- HEADER -->
        <div class="bg-black p-4 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div id="avatar" class="w-10 h-10 bg-yellow-400 rounded-full flex items-center justify-center text-3xl">👤</div>
                <div>
                    <div id="username" class="font-bold">Guest</div>
                    <div id="tg-id-display" class="text-emerald-400 text-xs">ID: loading...</div>
                </div>
            </div>
            <div class="text-right">
                <div id="balance" class="text-3xl font-bold text-yellow-300">500.00</div>
            </div>
        </div>

        <!-- TABS -->
        <div class="flex border-b border-zinc-700 text-sm bg-black">
            <button onclick="switchTab(0)" class="tab-active flex-1 py-3" id="tab0">CHƠI</button>
            <button onclick="switchTab(1)" class="flex-1 py-3" id="tab1">NẠP</button>
            <button onclick="switchTab(2)" class="flex-1 py-3" id="tab2">RÚT</button>
            <button onclick="switchTab(3)" class="flex-1 py-3" id="tab3">LỊCH SỬ</button>
        </div>

        <!-- CHƠI -->
        <div id="content0" class="flex-1 p-6">
            <div id="countdown" class="text-center text-8xl font-bold text-yellow-300 mb-8">20</div>
            <div class="flex justify-center gap-8 mb-10">
                <div id="dice1" class="dice">🎲<span class="dice-number">?</span></div>
                <div id="dice2" class="dice">🎲<span class="dice-number">?</span></div>
                <div id="dice3" class="dice">🎲<span class="dice-number">?</span></div>
            </div>
            <div class="text-center mb-8">
                <div id="result-sum" class="text-6xl font-bold text-yellow-300">?</div>
                <div id="result-text" class="text-3xl font-bold mt-2"></div>
            </div>
            <div class="bg-zinc-900 rounded-3xl p-6">
                <div class="text-center mb-4">ĐÃ CƯỢC: <span id="current-bet-display" class="text-yellow-400">0 Credits</span></div>
                <div class="flex gap-4 mb-6">
                    <button onclick="selectChoice('Tai')" id="btn-tai" class="flex-1 py-6 rounded-2xl bg-green-600 text-xl">TÀI</button>
                    <button onclick="selectChoice('Xiu')" id="btn-xiu" class="flex-1 py-6 rounded-2xl bg-red-600 text-xl">XỈU</button>
                </div>
                <div class="flex gap-3">
                    <input id="bet-amount" type="number" value="0" class="flex-1 bg-black text-center text-4xl py-5 rounded-2xl" oninput="updateBetDisplay()">
                    <button onclick="setMaxBet()" class="bg-yellow-400 text-black px-10 rounded-2xl">MAX</button>
                </div>
            </div>
        </div>

        <!-- NẠP, RÚT, LỊCH SỬ giữ nguyên như code trước -->
        <!-- (để ngắn, anh copy phần content1, content2, content3 từ code lần trước) -->

        <div class="bg-black p-4 text-center text-xs text-zinc-500">Auto roll 20s • Dữ liệu lưu trên máy anh</div>
    </div>

    <script>
        // === SCRIPT ĐÃ FIX HOÀN TOÀN ===
        let telegramId = 'local-test';
        let balance = 500;
        let choice = '';
        let betAmount = 0;
        let countdown = 20;
        let countdownInterval = null;
        let history = [];

        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
            const user = Telegram.WebApp.initDataUnsafe.user;
            if (user && user.id) telegramId = user.id.toString();
        }
        document.getElementById('tg-id-display').textContent = `ID: ${telegramId}`;

        function rollDiceAuto() {
            // ... (lắc xúc xắc)
            // Sau khi roll:
            if (betAmount >= 10 && choice) {
                balance += win ? betAmount : -betAmount;
                if (balance < 0) balance = 0;
                document.getElementById('balance').textContent = balance.toFixed(2);

                // GỬI DỮ LIỆU (đã fix)
                Telegram.WebApp.sendData(JSON.stringify({
                    action: 'update_balance',
                    telegramId: telegramId,
                    balance: balance
                }));
            }
            startCountdown();
        }

        // Các hàm khác giữ nguyên như code trước
        switchTab(0);
        startCountdown();
    </script>
</body>
</html>
