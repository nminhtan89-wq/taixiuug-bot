<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Master - Tài Xỉu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', system-ui; background: #111827; color: white; }
        .dice {
            width: 110px; height: 110px;
            background: linear-gradient(145deg, #fff, #f1f1f1);
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 0 8px 15px rgba(255,255,255,0.8), inset 0 -8px 15px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            position: relative; font-size: 85px;
        }
        .dice-number { position: absolute; font-size: 62px; font-weight: bold; color: #111827; text-shadow: 0 0 15px #fbbf24; z-index: 10; }
        @keyframes shake { 0% { transform: translate(0,0) rotate(0deg); } 10% { transform: translate(-6px,5px) rotate(-8deg); } 20% { transform: translate(5px,-4px) rotate(7deg); } 30% { transform: translate(-4px,3px) rotate(-6deg); } 40% { transform: translate(6px,-5px) rotate(8deg); } 50% { transform: translate(-3px,4px) rotate(-4deg); } 100% { transform: translate(0,0) rotate(0deg); } }
        .shake { animation: shake 0.9s; }
        .tab-active { border-bottom: 4px solid #fbbf24; }
    </style>
</head>
