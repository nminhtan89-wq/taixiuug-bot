<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICE MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', system-ui; background: #0a0a0a; color: white; }
        .dice { width: 130px; height: 130px; background: linear-gradient(145deg,#ffeb3b,#f57f17); border-radius: 24px; box-shadow: 0 0 40px #ffeb3b; display: flex; align-items: center; justify-content: center; position: relative; font-size: 95px; }
        .dice-number { position: absolute; font-size: 72px; color: #111827; font-weight: 900; }
        @keyframes shake { 0%{transform:rotate(0deg)} 25%{transform:rotate(-18deg)} 50%{transform:rotate(18deg)} 75%{transform:rotate(-12deg)} 100%{transform:rotate(0deg)} }
        .shake { animation: shake 0.95s; }
        .tab-active { border-bottom: 6px solid #ffeb3b; color: #ffeb3b; }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-md mx-auto bg-zinc-950 min-h-screen flex flex-col">
        <!-- HEADER -->
        <div class="bg-black p-5 flex justify-between items-center sticky top-0 z-50 border-b border-yellow-400">
            <div class="flex items-center gap-3">
                <div id="avatar" class="w-11 h-11 bg-yellow-400 rounded-full flex items-center justify-center text-4xl">👤</div>
                <div>
                    <div id="username" class="font-bold text-2xl">Guest</div>
                    <div id="tg-id-display" class="text-emerald-400 text-sm">ID: loading...</div>
                </div>
            </div>
            <div id="balance" class="text-4xl font-bold text-yellow-300">500.00</div>
        </div>

        <!-- TABS -->
        <div class="flex bg-black border-b border-zinc-700 text-sm sticky top-[73px] z-50">
            <button onclick="switchTab(0)" class="tab-active flex-1 py-4" id="tab0">🎲 CHƠI</button>
            <button onclick="switchTab(1)" class="flex-1 py-4" id="tab1">💬 CHAT</button>
            <button onclick="switchTab(2)" class="flex-1 py-4" id="tab2">💰 NẠP</button>
            <button onclick="switchTab(3)" class="flex-1 py-4" id="tab3">💸 RÚT</button>
        </div>

        <!-- CHƠI -->
        <div id="content0" class="flex-1 p-6">
            <div class="text-center mb-2 text-yellow-300 text-xs">VÒNG MỚI SAU</div>
            <div id="countdown" class="text-center text-8xl font-bold text-yellow-400 mb-8">20</div>
            <div class="flex justify-center gap-8 mb-10">
                <div id="dice1" class="dice">🎲<span class="dice-number">?</span></div>
                <div id="dice2" class="dice">🎲<span class="dice-number">?</span></div>
                <div id="dice3" class="dice">🎲<span class="dice-number">?</span></div>
            </div>
            <div class="text-center mb-8">
                <div id="result-sum" class="text-6xl font-bold text-yellow-300">?</div>
                <div id="result-text" class="text-3xl font-bold mt-3"></div>
            </div>
            <div class="bg-zinc-900 rounded-3xl p-6">
                <div class="text-center text-sm mb-4">ĐÃ CƯỢC: <span id="current-bet-display" class="text-yellow-400 font-bold">0 Credits</span></div>
                <!-- PHẦN INPUT + MAX ĐÃ SÁT NHAU HOÀN TOÀN -->
                <div class="flex items-center gap-2">
                    <input id="bet-amount" type="number" value="0" class="flex-1 bg-black text-center text-4xl py-6 rounded-l-3xl border border-yellow-400 focus:outline-none" oninput="updateBetDisplay()">
                    <button onclick="setMaxBet()" class="bg-yellow-400 text-black px-10 py-6 rounded-r-3xl font-bold text-xl">MAX</button>
                </div>
            </div>
        </div>

        <div class="bg-black p-4 text-center text-xs text-zinc-500">Auto roll 20s • Balance lưu vĩnh viễn</div>
    </div>

    <script>
        let telegramId = 'local-test';
        let balance = 500;
        let choice = '';
        let betAmount = 0;
        let countdown = 20;
        let countdownInterval = null;

        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
            const user = Telegram.WebApp.initDataUnsafe.user;
            if (user && user.id) telegramId = user.id.toString();
        }
        document.getElementById('tg-id-display').textContent = `ID: ${telegramId}`;

        const saved = localStorage.getItem(`balance_${telegramId}`);
        if (saved) {
            balance = parseFloat(saved);
            document.getElementById('balance').textContent = balance.toFixed(2);
        }

        function saveBalance() {
            localStorage.setItem(`balance_${telegramId}`, balance);
        }

        function updateBetDisplay() {
            let input = document.getElementById('bet-amount');
            betAmount = parseFloat(input.value) || 0;
            if (betAmount > balance) {
                betAmount = balance;
                input.value = balance;
            }
            document.getElementById('current-bet-display').textContent = betAmount + ' Credits';
        }

        function setMaxBet() {
            document.getElementById('bet-amount').value = balance;
            updateBetDisplay();
        }

        function rollDiceAuto() {
            const diceEls = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];
            diceEls.forEach(d => d.classList.add('shake'));
            setTimeout(() => {
                let total = 0;
                for (let i = 0; i < 3; i++) {
                    const num = Math.floor(Math.random() * 6) + 1;
                    diceEls[i].innerHTML = `🎲<span class="dice-number">${num}</span>`;
                    total += num;
                }
                diceEls.forEach(d => d.classList.remove('shake'));

                document.getElementById('result-sum').textContent = total;
                const win = (choice === 'Tai' && total > 10) || (choice === 'Xiu' && total <= 10);
                document.getElementById('result-text').innerHTML = win ? '🎉 THẮNG!' : '😢 THUA';

                if (betAmount >= 10 && choice) {
                    balance += win ? betAmount : -betAmount;
                    if (balance < 0) balance = 0;
                    document.getElementById('balance').textContent = balance.toFixed(2);
                    saveBalance();
                }

                choice = '';
                betAmount = 0;
                document.getElementById('bet-amount').value = '0';
                updateBetDisplay();
                startCountdown();
            }, 900);
        }

        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            countdown = 20;
            document.getElementById('countdown').textContent = 20;
            countdownInterval = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    rollDiceAuto();
                }
            }, 1000);
        }

        function selectChoice(c) {
            choice = c;
            document.getElementById('btn-tai').classList.toggle('bg-green-500', c === 'Tai');
            document.getElementById('btn-xiu').classList.toggle('bg-red-500', c === 'Xiu');
            updateBetDisplay();
        }

        function switchTab(n) {
            document.querySelectorAll('#tab0,#tab1,#tab2,#tab3').forEach((b,i) => b.classList.toggle('tab-active', i===n));
        }

        switchTab(0);
        startCountdown();
    </script>
</body>
</html>
