    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', system-ui; background: #0a0a0a; color: white; overflow-x: hidden; }
        
        /* Hiệu ứng đổ bóng cho xúc xắc */
        .dice { 
            width: 80px; height: 80px; 
            background: linear-gradient(145deg,#ffeb3b,#f57f17); 
            border-radius: 15px; 
            box-shadow: 0 0 25px rgba(255, 235, 59, 0.6); 
            display: flex; align-items: center; justify-content: center; 
            position: relative; 
        }
        .dice-number { position: absolute; font-size: 40px; color: #111827; font-weight: 900; }
        
        /* Hiệu ứng rung lắc */
        @keyframes shake { 
            0%{transform:rotate(0deg)} 25%{transform:rotate(-15deg)} 
            50%{transform:rotate(15deg)} 75%{transform:rotate(-10deg)} 100%{transform:rotate(0deg)} 
        }
        .shake { animation: shake 0.2s infinite; }

        /* Nút bấm khi được chọn */
        .btn-choice { transition: all 0.2s; border-bottom: 6px solid rgba(0,0,0,0.3); }
        .btn-choice:active { transform: translateY(4px); border-bottom-width: 2px; }
        .btn-choice.active { outline: 4px solid white; outline-offset: 2px; transform: scale(1.05); z-index: 10; }

        .tab-active { border-bottom: 4px solid #ffeb3b; color: #ffeb3b; }
        
        /* Hiệu ứng chữ thắng/thua nhấp nháy */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .blink { animation: blink 0.5s infinite; }
    </style>
</head>
